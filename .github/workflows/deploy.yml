  #         zola build --drafts --base-url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.number }}/

  #     - name: Deploy PR Preview
  #       uses: rossjrw/pr-preview-action@v1
  #       with:
  #         source-dir: ./public/

  # JOB 2: Handle Live Production (Modern, branchless Native API method)
  production_deploy:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      pages: write # Required to push direct to GitHub's native hosting
      id-token: write # Required for security validation
    environment:
      name: github-pages
    steps:
      - name: Checkout with Submodules
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Zola
        run: sudo snap install --edge zola

      - name: Build Production Site
        run: zola build

      - name: Upload Native Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy Live to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
