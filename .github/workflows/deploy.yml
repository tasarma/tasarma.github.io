name: Zola Build & Deploy (With Previews)

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

# Cancel older runs on the same PR if a new commit comes in
concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: true # Changed to true so new commits override old runs

jobs:
  # JOB 1: Handle Pull Request Previews
  pr_preview:
    if: github.event_name == 'pull_request' # Explicitly target PR events
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - name: Checkout with Submodules
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Zola
        if: github.event.action != 'closed'
        run: sudo snap install --edge zola

      - name: Build Preview Site
        if: github.event.action != 'closed'
        run: |
          zola build --drafts --base-url https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/pr-preview/pr-${{ github.event.number }}/

      - name: Deploy PR Preview
        uses: rossjrw/pr-preview-action@v1
        with:
          source-dir: ./public/

  # JOB 2: Handle Live Production (Only runs on push to main)
  production_deploy:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main' # Enforce push event only
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
    steps:
      - name: Checkout with Submodules
        uses: actions/checkout@v4
        with:
          submodules: "recursive"

      - name: Install Zola
        run: sudo snap install --edge zola

      - name: Build Production Site
        run: zola build

      - name: Upload Native Pages Artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: public/

      - name: Deploy Live to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
