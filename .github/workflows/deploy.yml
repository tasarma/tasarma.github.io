name: Zola Build & Deploy (With Previews)

on:
  push:
    branches:
      - main
  pull_request:
    types:
      - opened
      - reopened
      - synchronize
      - closed

# Cancel older runs on the same PR if a new commit comes in
concurrency:
  group: preview-${{ github.ref }}
  cancel-in-progress: false

jobs:
  # JOB 1: Handle Pull Request Previews (Traditional Git branch method)
